<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTATO PRO · Super Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#0a0b1e; color:#fff; padding:20px; }
        .app { max-width:1400px; margin:0 auto; }
        header { display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); border-radius:20px; padding:20px; margin-bottom:30px; }
        .logo h1 { font-size:1.8rem; background:linear-gradient(135deg,#ad00f1,#ff007a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .logout-btn { background:rgba(255,77,77,0.2); border:1px solid #ff4d4d; color:#ff4d4d; padding:10px 20px; border-radius:30px; cursor:pointer; }
        .section-title { margin:30px 0 20px; font-size:1.4rem; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px; }
        .tabs { display:flex; gap:10px; margin-bottom:30px; flex-wrap:wrap; }
        .tab { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:30px; padding:12px 24px; cursor:pointer; transition:0.2s; }
        .tab.active { background:linear-gradient(135deg,#ad00f1,#00d4ff); color:white; border-color:transparent; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; background:rgba(255,255,255,0.03); border-radius:20px; padding:25px; margin-bottom:20px; }
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; color:#a0a0b8; margin-bottom:6px; }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:12px 16px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:white; }
        .btn-primary { background:linear-gradient(135deg,#ad00f1,#00d4ff); border:none; border-radius:30px; padding:12px 30px; color:white; font-weight:600; cursor:pointer; }
        .btn-danger { background:rgba(255,77,77,0.2); border:1px solid #ff4d4d; color:#ff4d4d; border-radius:30px; padding:10px 20px; cursor:pointer; }
        .list-container { background:rgba(255,255,255,0.02); border-radius:20px; padding:20px; max-height:400px; overflow-y:auto; }
        .item-row { display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .badge-success { background:#00f190; color:black; padding:4px 12px; border-radius:20px; }
        .badge-danger { background:#ff4d4d; color:white; padding:4px 12px; border-radius:20px; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:30px; }
        .stat-card { background:rgba(255,255,255,0.05); border-radius:16px; padding:20px; }
        .profit { color:#00f190; }
        .loss { color:#ff4d4d; }
        .alert { padding:15px; border-radius:12px; margin-bottom:20px; display:none; }
        .alert-success { background:rgba(0,241,144,0.2); border:1px solid #00f190; color:#00f190; }
        .alert-danger { background:rgba(255,77,77,0.2); border:1px solid #ff4d4d; color:#ff4d4d; }
    </style>
</head>
<body>
    <div class="app" id="login-section" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
        <div style="background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); border-radius:20px; padding:40px; width:100%; max-width:400px;">
            <h2 style="text-align:center; margin-bottom:30px;">🔐 Super Admin</h2>
            <div class="form-group">
                <label>Identifiant</label>
                <input type="text" id="login-username" placeholder="superadmin@lotato.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="login-password" placeholder="********">
            </div>
            <button class="btn-primary" style="width:100%;" onclick="superAdminLogin()">Se connecter</button>
            <div id="login-error" class="alert alert-danger" style="margin-top:20px;"></div>
        </div>
    </div>

    <div class="app" id="main-section" style="display:none;">
        <header>
            <div class="logo">
                <h1>LOTATO PRO · Super Admin</h1>
            </div>
            <div>
                <span id="admin-name"></span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
            </div>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('owners')">👥 Propriétaires</div>
            <div class="tab" onclick="switchTab('agents')">👤 Agents & Superviseurs</div>
            <div class="tab" onclick="switchTab('messages')">📢 Messages aux propriétaires</div>
            <div class="tab" onclick="switchTab('reports')">📊 Rapports consolidés</div>
        </div>

        <!-- Onglet Propriétaires -->
        <div id="tab-owners" class="tab-content active">
            <div class="section-title"><i class="fas fa-plus-circle"></i> Créer un propriétaire</div>
            <div id="owner-create-message" class="alert"></div>
            <div class="form-grid">
                <div class="form-group"><label>Nom</label><input type="text" id="owner-name" placeholder="Jean Propriétaire"></div>
                <div class="form-group"><label>Email</label><input type="email" id="owner-email" placeholder="jean@lotato.com"></div>
                <div class="form-group"><label>Téléphone</label><input type="text" id="owner-phone" placeholder="+509 00 00 0000"></div>
                <div class="form-group"><label>Mot de passe</label><input type="password" id="owner-password" value="default123"></div>
                <div><button class="btn-primary" onclick="createOwner()">Créer</button></div>
            </div>

            <div class="section-title"><i class="fas fa-list"></i> Liste des propriétaires</div>
            <div id="owners-list" class="list-container"></div>
        </div>

        <!-- Onglet Agents & Superviseurs -->
        <div id="tab-agents" class="tab-content">
            <div class="section-title"><i class="fas fa-user-times"></i> Supprimer un agent ou superviseur</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Type</label>
                    <select id="delete-type">
                        <option value="agent">Agent</option>
                        <option value="supervisor">Superviseur</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ID de l'utilisateur</label>
                    <input type="number" id="delete-id" placeholder="123">
                </div>
                <div><button class="btn-danger" onclick="deleteUser()">Supprimer définitivement</button></div>
            </div>
            <div id="delete-message" class="alert"></div>
        </div>

        <!-- Onglet Messages -->
        <div id="tab-messages" class="tab-content">
            <div class="section-title"><i class="fas fa-bell"></i> Envoyer une alerte à un propriétaire</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Propriétaire</label>
                    <select id="message-owner"></select>
                </div>
                <div class="form-group">
                    <label>Message (visible 10 min après connexion)</label>
                    <textarea id="message-text" rows="3" placeholder="Ex: Maintenance prévue ce soir..."></textarea>
                </div>
                <div><button class="btn-primary" onclick="sendMessage()">Envoyer</button></div>
            </div>
            <div id="message-result" class="alert"></div>
        </div>

        <!-- Onglet Rapports -->
        <div id="tab-reports" class="tab-content">
            <div class="section-title"><i class="fas fa-chart-pie"></i> Rapports du jour par propriétaire</div>
            <div id="owners-reports" class="list-container"></div>
        </div>
    </div>

    <script>
        const API_BASE = ''; // Laissez vide si même origine
        let token = localStorage.getItem('superadmin_token');
        let adminName = localStorage.getItem('superadmin_name') || '';

        // Vérifier si déjà connecté
        if (token) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-section').style.display = 'block';
            document.getElementById('admin-name').innerText = adminName;
            loadOwners();
            loadOwnerSelect();
            loadReports();
        }

        // Connexion super-admin (sans rechargement)
        async function superAdminLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            if (!username || !password) {
                showLoginError('Veuillez saisir identifiant et mot de passe');
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/auth/superadmin-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    adminName = data.name;
                    localStorage.setItem('superadmin_token', token);
                    localStorage.setItem('superadmin_name', adminName);
                    // Afficher la section principale sans recharger
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('main-section').style.display = 'block';
                    document.getElementById('admin-name').innerText = adminName;
                    loadOwners();
                    loadOwnerSelect();
                    loadReports();
                } else {
                    showLoginError(data.error || 'Identifiants incorrects');
                }
            } catch (e) {
                showLoginError('Erreur réseau');
            }
        }

        function showLoginError(msg) {
            const el = document.getElementById('login-error');
            el.style.display = 'block';
            el.innerText = msg;
        }

        function logout() {
            localStorage.removeItem('superadmin_token');
            localStorage.removeItem('superadmin_name');
            window.location.reload();
        }

        // Navigation par onglets
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.tab[onclick*="${tabId}"]`).classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
            if (tabId === 'owners') loadOwners();
            if (tabId === 'messages') loadOwnerSelect();
            if (tabId === 'reports') loadReports();
        }

        // Fonction utilitaire pour les requêtes avec token
        async function fetchWithToken(url, options = {}) {
            const headers = {
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) {
                // Token invalide ou expiré
                alert('Session expirée, veuillez vous reconnecter');
                logout();
                return null;
            }
            return res;
        }

        // ========== GESTION PROPRIÉTAIRES ==========
        async function loadOwners() {
            const res = await fetchWithToken(`${API_BASE}/api/superadmin/owners`);
            if (!res) return;
            const owners = await res.json();
            let html = '';
            owners.forEach(o => {
                html += `<div class="item-row">
                    <span><strong>${o.name}</strong> (${o.email})</span>
                    <span class="${o.active ? 'badge-success' : 'badge-danger'}">${o.active ? 'Actif' : 'Bloqué'}</span>
                    <div>
                        <button class="btn-primary" style="padding:4px 10px; margin-right:5px;" onclick="toggleBlockOwner(${o.id}, ${o.active})">
                            ${o.active ? 'Bloquer' : 'Débloquer'}
                        </button>
                        <button class="btn-danger" style="padding:4px 10px;" onclick="deleteOwner(${o.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('owners-list').innerHTML = html || '<p>Aucun propriétaire</p>';
        }

        async function createOwner() {
            const name = document.getElementById('owner-name').value;
            const email = document.getElementById('owner-email').value;
            const phone = document.getElementById('owner-phone').value;
            const password = document.getElementById('owner-password').value;
            if (!name || !email || !password) {
                showMessage('owner-create-message', 'Veuillez remplir tous les champs', false);
                return;
            }
            const res = await fetchWithToken(`${API_BASE}/api/superadmin/owners`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, phone })
            });
            if (!res) return;
            const data = await res.json();
            if (data.success) {
                showMessage('owner-create-message', '✅ Propriétaire créé', true);
                loadOwners();
                document.getElementById('owner-name').value = '';
                document.getElementById('owner-email').value = '';
                document.getElementById('owner-phone').value = '';
                document.getElementById('owner-password').value = 'default123';
            } else {
                showMessage('owner-create-message', '❌ ' + (data.error || 'Erreur'), false);
            }
        }

        async function toggleBlockOwner(id, currentActive) {
            const block = currentActive; // si actif, on bloque (true)
            const res = await fetchWithToken(`${API_BASE}/api/superadmin/owners/${id}/block`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ block })
            });
            if (res && res.ok) loadOwners();
        }

        async function deleteOwner(id) {
            if (!confirm('Supprimer définitivement ce propriétaire ?')) return;
            const res = await fetchWithToken(`${API_BASE}/api/superadmin/owners/${id}`, {
                method: 'DELETE'
            });
            if (res && res.ok) loadOwners();
        }

        // ========== SUPPRESSION AGENT / SUPERVISEUR ==========
        async function deleteUser() {
            const type = document.getElementById('delete-type').value;
            const id = document.getElementById('delete-id').value;
            if (!id) return;
            if (!confirm(`Supprimer définitivement ${type} ID ${id} ?`)) return;
            const res = await fetchWithToken(`${API_BASE}/api/superadmin/${type}s/${id}`, {
                method: 'DELETE'
            });
            if (!res) return;
            const data = await res.json();
            if (res.ok) {
                showMessage('delete-message', '✅ Supprimé avec succès', true);
                document.getElementById('delete-id').value = '';
            } else {
                showMessage('delete-message', '❌ ' + (data.error || 'Erreur'), false);
            }
        }

        // ========== MESSAGES ==========
        async function loadOwnerSelect() {
            const res = await fetchWithToken(`${API_BASE}/api/superadmin/owners`);
            if (!res) return;
            const owners = await res.json();
            let opts = '<option value="">Choisir un propriétaire</option>';
            owners.forEach(o => opts += `<option value="${o.id}">${o.name}</option>`);
            document.getElementById('message-owner').innerHTML = opts;
        }

        async function sendMessage() {
            const ownerId = document.getElementById('message-owner').value;
            const message = document.getElementById('message-text').value;
            if (!ownerId || !message) {
                showMessage('message-result', 'Veuillez sélectionner un propriétaire et saisir un message', false);
                return;
            }
            const res = await fetchWithToken(`${API_BASE}/api/superadmin/messages`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ownerId, message })
            });
            if (!res) return;
            if (res.ok) {
                showMessage('message-result', '✅ Message envoyé (visible 10 min)', true);
                document.getElementById('message-text').value = '';
            } else {
                showMessage('message-result', '❌ Erreur envoi', false);
            }
        }

        // ========== RAPPORTS ==========
        async function loadReports() {
            const res = await fetchWithToken(`${API_BASE}/api/superadmin/reports/owners`);
            if (!res) return;
            const reports = await res.json();
            let html = '<table><thead><tr><th>Propriétaire</th><th>Agents</th><th>Tickets</th><th>Mises (G)</th><th>Gains (G)</th><th>Résultat net</th></tr></thead><tbody>';
            reports.forEach(r => {
                const netClass = r.net_result >= 0 ? 'profit' : 'loss';
                html += `<tr>
                    <td>${r.name}</td>
                    <td>${r.agent_count}</td>
                    <td>${r.ticket_count}</td>
                    <td>${parseFloat(r.total_bets).toLocaleString()}</td>
                    <td>${parseFloat(r.total_wins).toLocaleString()}</td>
                    <td class="${netClass}">${parseFloat(r.net_result).toLocaleString()}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('owners-reports').innerHTML = html || '<p>Aucune donnée</p>';
        }

        // Utilitaire d'affichage de message
        function showMessage(elId, text, isSuccess) {
            const el = document.getElementById(elId);
            el.style.display = 'block';
            el.className = isSuccess ? 'alert alert-success' : 'alert alert-danger';
            el.innerText = text;
            setTimeout(() => el.style.display = 'none', 4000);
        }

        // Exposer les fonctions globalement
        window.switchTab = switchTab;
        window.superAdminLogin = superAdminLogin;
        window.logout = logout;
        window.createOwner = createOwner;
        window.toggleBlockOwner = toggleBlockOwner;
        window.deleteOwner = deleteOwner;
        window.deleteUser = deleteUser;
        window.sendMessage = sendMessage;
        window.loadReports = loadReports;
    </script>
</body>
</html>
