<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LOTATO PRO - Terminal à boutons</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: #000; color: #0f0; font-family: 'Courier New', monospace;
            font-size: 24px; margin: 0; padding: 10px; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .terminal { max-width: 800px; margin: 0 auto; width: 100%; height: 100%; display: flex; flex-direction: column; gap: 15px; }
        .login-screen { background: #111; border: 2px solid #0f0; padding: 20px; text-align: center; }
        .login-screen input { width: 100%; background: #000; border: 2px solid #0f0; color: #0f0; font-size: 28px; padding: 10px; margin: 10px 0; font-family: monospace; text-align: center; }
        .login-screen button { background: #222; border: 2px solid #0f0; color: #0f0; font-size: 28px; padding: 10px 20px; cursor: pointer; width: 100%; }
        .login-screen button:focus { background: #0f0; color: #000; outline: none; }
        .main-app { display: none; flex-direction: column; gap: 15px; height: 100%; }
        .header { border-bottom: 2px solid #0f0; padding-bottom: 8px; display: flex; justify-content: space-between; font-size: 20px; }
        .draw-selector { background: #111; border: 2px solid #0f0; padding: 10px; }
        .draw-list { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 12px; padding: 5px 0; }
        .draw-item { background: #222; padding: 8px 12px; border-radius: 8px; cursor: pointer; white-space: nowrap; border: 1px solid #0f0; opacity: 0.7; transition: all 0.1s; }
        .draw-item.active { background: #0f0; color: #000; opacity: 1; transform: scale(1.02); }
        .draw-item:focus { outline: 3px solid #0f0; }
        .input-area { display: flex; gap: 12px; flex-wrap: wrap; background: #111; padding: 15px; border: 2px solid #0f0; }
        .input-group { flex: 1; min-width: 150px; }
        .input-group label { display: block; font-size: 18px; margin-bottom: 5px; }
        .input-group input { width: 100%; background: #000; border: 2px solid #0f0; color: #0f0; font-size: 28px; padding: 10px; font-family: monospace; text-align: center; }
        .input-group input:focus { outline: none; background: #0f0; color: #000; }
        .action-buttons { display: flex; gap: 15px; margin-top: 10px; }
        button { background: #222; border: 2px solid #0f0; color: #0f0; font-size: 28px; padding: 12px 20px; font-family: monospace; font-weight: bold; cursor: pointer; transition: 0.05s linear; }
        button:focus { background: #0f0; color: #000; outline: none; }
        .cart { background: #111; border: 2px solid #0f0; padding: 10px; flex: 1; overflow-y: auto; min-height: 150px; }
        .cart-header { display: flex; justify-content: space-between; border-bottom: 1px solid #0f0; padding-bottom: 5px; margin-bottom: 8px; }
        .cart-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dotted #0f0; font-size: 22px; }
        .cart-total { text-align: right; font-weight: bold; margin-top: 10px; padding-top: 8px; border-top: 2px solid #0f0; font-size: 28px; }
        .empty-msg { text-align: center; color: #888; padding: 20px; }
        .error-msg, .info-msg { background: #300; color: #f88; padding: 8px; border-left: 5px solid #f00; font-size: 20px; }
        .info-msg { background: #030; color: #8f8; border-left-color: #0f0; }
        .game-hint { font-size: 16px; background: #111; padding: 5px; text-align: center; border-top: 1px solid #0f0; }
        @media (max-width: 600px) { body { font-size: 18px; } button { font-size: 22px; padding: 8px 12px; } .input-group input { font-size: 24px; } .cart-item { font-size: 18px; } }
    </style>
</head>
<body>
<div class="terminal">
    <div id="login-screen" class="login-screen">
        <h2>KONEXION</h2>
        <input type="text" id="login-username" placeholder="Non itilizatè">
        <input type="password" id="login-password" placeholder="Modpas">
        <button id="login-btn">KONNEKTE</button>
        <div id="login-message" style="margin-top: 10px; font-size: 18px;"></div>
    </div>

    <div id="main-app" class="main-app">
        <div class="header">
            <span class="logo" id="lottery-name">LOTATO PRO</span>
            <span class="clock" id="live-clock">--:--:--</span>
            <span id="agent-name" style="font-size: 18px;"></span>
        </div>
        <div class="draw-selector">
            <div class="draw-list" id="draws-list"></div>
        </div>
        <div class="input-area">
            <div class="input-group">
                <label>NUMÉRO</label>
                <input type="text" id="num-input" placeholder="00" maxlength="5" autocomplete="off">
            </div>
            <div class="input-group">
                <label>MONTANT (G)</label>
                <input type="number" id="amt-input" placeholder="0" step="1" min="1" autocomplete="off">
            </div>
            <div class="action-buttons">
                <button id="add-btn">AJOUTER</button>
                <button id="print-btn">VALIDER</button>
            </div>
        </div>
        <div class="cart">
            <div class="cart-header">
                <span>PANYE</span>
                <span id="items-count">0 jwèt</span>
            </div>
            <div id="cart-display" class="cart-items"></div>
            <div class="cart-total">
                TOTAL: <span id="cart-total-display">0</span> Gdes
            </div>
        </div>
        <div id="message-area" style="font-size: 18px;"></div>
        <div class="game-hint">
            F1=Borlette | F2=Lotto3 | F3=Lotto4 | F4=Lotto5 | F5=Mariage | F6=AutoMariage | F7=BO | F8=GRAP
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="gameEngine.js"></script>
<script src="apiService.js"></script>

<script>
    // ==================== VARIABLES GLOBALES ====================
    let authToken = null;
    let agentId = null;
    let agentName = null;

    let draws = [];
    let selectedDraw = null;
    let globalBlocked = [];
    let drawBlocked = {};
    let numberLimits = {};

    // Panier local
    let currentCart = [];

    // DOM elements
    const loginScreen = document.getElementById('login-screen');
    const mainApp = document.getElementById('main-app');
    const drawListDiv = document.getElementById('draws-list');
    const numInput = document.getElementById('num-input');
    const amtInput = document.getElementById('amt-input');
    const addBtn = document.getElementById('add-btn');
    const printBtn = document.getElementById('print-btn');
    const messageArea = document.getElementById('message-area');
    const agentNameSpan = document.getElementById('agent-name');

    // ==================== UTILITAIRES ====================
    function showMessage(msg, isError = false) {
        messageArea.innerHTML = `<div class="${isError ? 'error-msg' : 'info-msg'}">${msg}</div>`;
        setTimeout(() => { if (messageArea.firstChild) messageArea.innerHTML = ''; }, 4000);
    }

    async function fetchAPI(endpoint, options = {}) {
        const url = `${API_CONFIG.BASE_URL}${endpoint}`;
        const headers = {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json',
            ...options.headers
        };
        const resp = await fetch(url, { ...options, headers });
        if (!resp.ok) {
            const text = await resp.text();
            throw new Error(`HTTP ${resp.status}: ${text}`);
        }
        return resp.json();
    }

    // ==================== CHARGEMENT DES DONNÉES ====================
    async function loadDraws() {
        try {
            const data = await fetchAPI('/draws');
            draws = data.draws.filter(d => d.active !== false);
            if (draws.length === 0) throw new Error('Aucun tirage actif');
            if (!selectedDraw) selectedDraw = draws[0];
            renderDrawList();
        } catch (err) {
            console.error(err);
            showMessage("Erreur chargement tirages", true);
            draws = [{ id: 'tn_matin', name: 'Tunisia Matin' }, { id: 'tn_soir', name: 'Tunisia Soir' }];
            selectedDraw = draws[0];
            renderDrawList();
        }
    }

    async function loadBlockedNumbers() {
        try {
            const globalRes = await fetchAPI('/blocked-numbers/global');
            globalBlocked = globalRes.blockedNumbers || [];
            const drawBlockedTemp = {};
            for (const draw of draws) {
                try {
                    const res = await fetchAPI(`/blocked-numbers/draw/${draw.id}`);
                    drawBlockedTemp[draw.id] = res.blockedNumbers || [];
                } catch(e) { drawBlockedTemp[draw.id] = []; }
            }
            drawBlocked = drawBlockedTemp;
        } catch(e) { console.warn(e); }
    }

    async function loadNumberLimits() {
        try {
            const limits = await fetchAPI('/number-limits');
            numberLimits = {};
            limits.forEach(l => {
                const key = `${l.draw_id || 'global'}_${l.number}`;
                numberLimits[key] = parseFloat(l.limit_amount);
            });
        } catch(e) { console.warn(e); }
    }

    async function loadLotteryConfig() {
        try {
            const config = await fetchAPI('/lottery-settings');
            if (config) {
                CONFIG.LOTTERY_NAME = config.name || 'LOTATO';
                CONFIG.LOTTERY_LOGO = config.logo || config.logoUrl || '';
                CONFIG.slogan = config.slogan || '';
                document.getElementById('lottery-name').innerHTML = config.name;
            }
        } catch(e) { console.warn(e); }
    }

    function renderDrawList() {
        if (!drawListDiv) return;
        drawListDiv.innerHTML = draws.map(draw => `
            <div class="draw-item ${selectedDraw && selectedDraw.id === draw.id ? 'active' : ''}" data-id="${draw.id}" data-name="${draw.name}">
                ${draw.name}
            </div>
        `).join('');
        const activeDiv = drawListDiv.querySelector('.draw-item.active');
        if (activeDiv) activeDiv.focus();
    }

    function updateDrawSelection(newDrawId) {
        const draw = draws.find(d => d.id == newDrawId);
        if (draw) {
            selectedDraw = draw;
            renderDrawList();
            showMessage(`Tiraj chwazi: ${draw.name}`, false);
        }
    }

    // ==================== GESTION DU PANIER ====================
    function renderCart() {
        const container = document.getElementById('cart-display');
        const totalSpan = document.getElementById('cart-total-display');
        const itemsCountSpan = document.getElementById('items-count');

        if (!container) return;
        if (currentCart.length === 0) {
            container.innerHTML = '<div class="empty-msg">Panye vid</div>';
            totalSpan.innerText = '0';
            itemsCountSpan.innerText = '0 jwèt';
            return;
        }

        let total = 0;
        let count = 0;
        container.innerHTML = currentCart.map((item, idx) => {
            total += item.amount;
            count++;
            const gameAbbr = getGameAbbreviation(item.game);
            let displayNumber = item.number || item.cleanNumber;
            if (item.game === 'auto_marriage' && displayNumber && displayNumber.includes('&')) {
                displayNumber = displayNumber.replace('&', '*');
            }
            return `
                <div class="cart-item">
                    <span>${gameAbbr} ${displayNumber}</span>
                    <span>${item.amount} G</span>
                    <button onclick="removeBet(${idx})" style="background:none; border:none; color:#f00; font-size:20px;">✕</button>
                </div>
            `;
        }).join('');

        totalSpan.innerText = total.toLocaleString('fr-FR');
        itemsCountSpan.innerText = count + ' jwèt';
    }

    function getGameAbbreviation(game) {
        const map = {
            'borlette': 'BOR', 'lotto3': 'LO3', 'lotto4': 'LO4', 'lotto5': 'LO5',
            'mariage': 'MAR', 'auto_marriage': 'A-MAR', 'auto_lotto4': 'A-LO4',
            'auto_lotto5': 'A-LO5', 'bo': 'BO', 'grap': 'GRAP'
        };
        return map[game] || game.toUpperCase();
    }

    function removeBet(index) {
        currentCart.splice(index, 1);
        renderCart();
        showMessage("Mise retire", false);
    }

    // Vérifications de blocage et limites
    function isNumberBlocked(number, drawId) {
        if (globalBlocked.includes(number)) return true;
        return (drawBlocked[drawId] || []).includes(number);
    }

    function checkNumberLimit(number, drawId, amountToAdd) {
        const key = `${drawId}_${number}`;
        const limit = numberLimits[key];
        if (!limit) return { success: true };
        const current = currentCart
            .filter(b => b.drawId === drawId && b.cleanNumber === number)
            .reduce((sum, b) => sum + b.amount, 0);
        if (current + amountToAdd > limit) {
            return { success: false, msg: `Limite ${number} atteinte: max ${limit} G, déjà ${current} G` };
        }
        return { success: true };
    }

    // Ajout d'une mise
    function addBet() {
        if (!selectedDraw) {
            showMessage("Chwazi yon tiraj anvan", true);
            return;
        }
        const rawNum = numInput.value.trim();
        const amount = parseFloat(amtInput.value);
        if (isNaN(amount) || amount <= 0) {
            showMessage("Montan pa valab", true);
            return;
        }

        const game = window.currentGame || 'borlette'; // défini par les touches F1-F8

        // Pour les jeux spéciaux qui ne nécessitent pas de numéro
        if (game === 'bo' || game === 'grap' || game === 'auto_marriage' || game === 'auto_lotto4' || game === 'auto_lotto5') {
            // Génération automatique
            let autoBets = [];
            if (game === 'bo') autoBets = SpecialGames.generateBOBets(amount);
            else if (game === 'grap') autoBets = SpecialGames.generateGRAPBets(amount);
            else if (game === 'auto_marriage') autoBets = GameEngine.generateAutoMarriageBets(amount);
            else if (game === 'auto_lotto4') autoBets = GameEngine.generateAutoLotto4Bets(amount);
            else if (game === 'auto_lotto5') autoBets = GameEngine.generateAutoLotto5Bets(amount);

            if (!autoBets.length) {
                showMessage("Pa gen ase nimewo nan panye pou jenere " + game, true);
                return;
            }

            for (const bet of autoBets) {
                const number = bet.cleanNumber || bet.number;
                const check = checkNumberLimit(number, selectedDraw.id, amount);
                if (!check.success) {
                    showMessage(check.msg, true);
                    return;
                }
                if (isNumberBlocked(number, selectedDraw.id)) {
                    showMessage(`Nimewo ${number} bloke`, true);
                    return;
                }
            }

            for (const bet of autoBets) {
                currentCart.push({
                    ...bet,
                    id: Date.now() + Math.random(),
                    drawId: selectedDraw.id,
                    drawName: selectedDraw.name
                });
            }
            renderCart();
            numInput.value = '';
            amtInput.value = '';
            numInput.focus();
            showMessage(`${game.toUpperCase()} ajoute`, false);
            return;
        }

        // Pour les jeux normaux (borlette, lotto3,4,5, mariage)
        let cleanNum = rawNum.replace(/\D/g, '');
        if (!GameEngine.validateEntry(game, cleanNum)) {
            showMessage("Nimewo pa valid pou jwèt sa a", true);
            return;
        }

        // Ajustement du format selon le jeu
        if (game === 'borlette') cleanNum = cleanNum.padStart(2, '0');
        else if (game === 'lotto3') cleanNum = cleanNum.padStart(3, '0');
        else if (game === 'lotto4') cleanNum = cleanNum.padStart(4, '0');
        else if (game === 'lotto5') cleanNum = cleanNum.padStart(5, '0');
        else if (game === 'mariage') cleanNum = cleanNum.padStart(4, '0');

        const check = checkNumberLimit(cleanNum, selectedDraw.id, amount);
        if (!check.success) {
            showMessage(check.msg, true);
            return;
        }
        if (isNumberBlocked(cleanNum, selectedDraw.id)) {
            showMessage(`Nimewo ${cleanNum} bloke pou tiraj sa a`, true);
            return;
        }

        currentCart.push({
            id: Date.now() + Math.random(),
            game: game,
            number: (game === 'mariage') ? `${cleanNum.slice(0,2)}&${cleanNum.slice(2,4)}` : cleanNum,
            cleanNumber: cleanNum,
            amount: amount,
            drawId: selectedDraw.id,
            drawName: selectedDraw.name,
            timestamp: new Date().toISOString()
        });

        renderCart();
        numInput.value = '';
        amtInput.value = '';
        numInput.focus();
        showMessage(`Mise ajoute: ${cleanNum} - ${amount} G`, false);
    }

    // ==================== VALIDATION ET IMPRESSION ====================
    async function processFinalTicket() {
        if (currentCart.length === 0) {
            showMessage("Panye vid, pa gen tikè pou valide", true);
            return;
        }

        const printWindow = window.open('', '_blank', 'width=500,height=700');
        if (!printWindow) {
            showMessage("Pèmèt fenèt pop-up pou enprime", true);
            return;
        }
        printWindow.document.write('<html><head><title>Chargement...</title></head><body><p style="font-size:20px; text-align:center;">Génération du ticket...</p></body></html>');
        printWindow.document.close();

        const betsByDraw = {};
        currentCart.forEach(b => {
            if (!betsByDraw[b.drawId]) betsByDraw[b.drawId] = [];
            betsByDraw[b.drawId].push(b);
        });

        try {
            for (const drawId in betsByDraw) {
                const bets = betsByDraw[drawId];
                const total = bets.reduce((s, b) => s + b.amount, 0);
                const drawObj = draws.find(d => d.id == drawId);
                const payload = {
                    agentId: agentId,
                    agentName: agentName,
                    drawId: drawId,
                    drawName: drawObj ? drawObj.name : drawId,
                    bets: bets,
                    total: total
                };
                const res = await fetch(`${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.SAVE_TICKET}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error("Erreur serveur");
                const data = await res.json();
                data.ticket.date = new Date().toISOString();
                printTicket(data.ticket, printWindow);
            }
            currentCart = [];
            renderCart();
            showMessage("✅ Tikè sove & enprime", false);
        } catch (err) {
            console.error(err);
            showMessage("❌ Erè pandan enpresyon: " + err.message, true);
            printWindow.close();
        }
    }

    function printTicket(ticket, printWindow) {
        const html = generateTicketHTML(ticket);
        printWindow.document.write(html);
        printWindow.document.close();
        printWindow.onload = function() {
            printWindow.focus();
            printWindow.print();
        };
    }

    function generateTicketHTML(ticket) {
        const cfg = CONFIG;
        const lotteryName = cfg.LOTTERY_NAME || 'LOTATO PRO';
        const slogan = cfg.slogan || '';
        const drawName = ticket.draw_name || (draws.find(d => d.id == ticket.draw_id)?.name) || 'Tiraj';
        const date = new Date(ticket.date).toLocaleString('fr-FR');
        const betsHTML = (ticket.bets || []).map(b => `
            <div class="bet-row" style="display:flex; justify-content:space-between;">
                <span>${getGameAbbreviation(b.game)} ${b.number || b.cleanNumber}</span>
                <span>${b.amount} G</span>
            </div>
        `).join('');
        return `<!DOCTYPE html>
        <html>
        <head><title>Ticket</title>
        <style>
            @page { size: 80mm auto; margin: 2mm; }
            body { font-family: monospace; font-size: 28px; width: 76mm; margin: 0 auto; padding: 4mm; background: white; color: black; }
            .header { text-align: center; border-bottom: 2px dashed #000; }
            .total-row { font-weight: bold; margin-top: 10px; border-top: 1px solid #000; padding-top: 5px; }
            .footer { text-align: center; margin-top: 20px; font-size: 20px; }
        </style>
        </head>
        <body>
            <div class="header"><strong>${lotteryName}</strong><br>${slogan}</div>
            <p>Ticket #: ${ticket.ticket_id || ticket.id}</p>
            <p>Tiraj: ${drawName}</p>
            <p>Date: ${date}</p>
            <p>Ajan: ${ticket.agent_name || agentName}</p>
            <hr>
            ${betsHTML}
            <div class="total-row"><span>TOTAL</span><span>${ticket.total_amount || ticket.total || 0} Gdes</span></div>
            <div class="footer">Merci !</div>
        </body>
        </html>`;
    }

    // ==================== GESTION CLAVIER ET SÉLECTION JEU ====================
    let currentGame = 'borlette'; // par défaut

    function selectGame(game) {
        currentGame = game;
        const input = document.getElementById('num-input');
        if (game === 'auto_marriage' || game === 'auto_lotto4' || game === 'auto_lotto5' || game === 'bo' || game === 'grap') {
            input.disabled = true;
            input.value = '';
            input.placeholder = 'Auto-genere';
        } else {
            input.disabled = false;
            let placeholder = '';
            if (game === 'borlette') placeholder = '00';
            else if (game === 'lotto3') placeholder = '000';
            else if (game === 'lotto4') placeholder = '0000';
            else if (game === 'lotto5') placeholder = '00000';
            else if (game === 'mariage') placeholder = '0000';
            input.placeholder = placeholder;
            input.focus();
        }
        showMessage(`Jwèt chwazi: ${game.toUpperCase()}`, false);
    }

    let currentFocusIndex = 0;
    const focusableIds = ['num-input', 'amt-input', 'add-btn', 'print-btn'];
    function setFocusById(id) {
        const el = document.getElementById(id);
        if (el) el.focus();
        currentFocusIndex = focusableIds.indexOf(id);
    }

    function setupKeyboardNavigation() {
        setFocusById('num-input');
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                if (e.shiftKey) currentFocusIndex = (currentFocusIndex - 1 + focusableIds.length) % focusableIds.length;
                else currentFocusIndex = (currentFocusIndex + 1) % focusableIds.length;
                setFocusById(focusableIds[currentFocusIndex]);
            }
            const activeTag = document.activeElement.tagName;
            if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && activeTag !== 'INPUT') {
                e.preventDefault();
                const drawItems = document.querySelectorAll('.draw-item');
                let activeDraw = document.querySelector('.draw-item.active');
                let idx = Array.from(drawItems).findIndex(el => el === activeDraw);
                if (e.key === 'ArrowDown') idx = (idx + 1) % drawItems.length;
                if (e.key === 'ArrowUp') idx = (idx - 1 + drawItems.length) % drawItems.length;
                const newId = drawItems[idx].getAttribute('data-id');
                updateDrawSelection(newId);
                drawItems[idx].focus();
                return;
            }
            if (e.key === 'Enter') {
                const activeId = document.activeElement.id;
                if (activeId === 'add-btn') addBet();
                else if (activeId === 'print-btn') processFinalTicket();
                else if (activeId === 'num-input' || activeId === 'amt-input') addBet();
            }
            const gameMap = {
                'F1': 'borlette', 'F2': 'lotto3', 'F3': 'lotto4', 'F4': 'lotto5',
                'F5': 'mariage', 'F6': 'auto_marriage', 'F7': 'bo', 'F8': 'grap'
            };
            if (gameMap[e.key]) {
                e.preventDefault();
                selectGame(gameMap[e.key]);
            }
        });
    }

    // ==================== INITIALISATION APRÈS CONNEXION ====================
    async function initAfterLogin() {
        await loadLotteryConfig();
        agentNameSpan.innerText = agentName;
        renderCart();
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('fr-FR');
        }, 1000);
        showMessage("Terminal prèt - Chwazi tiraj ak nimewo", false);
        console.log("✅ Initialisation terminée");
    }

    // ==================== LOGIN ====================
    async function login(username, password) {
        const loginMsg = document.getElementById('login-message');
        loginMsg.innerText = 'Koneksyon...';
        try {
            const resp = await fetch(`${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.LOGIN}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role: 'agent' })
            });
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || 'Erreur');
            authToken = data.token;
            agentId = data.agentId;
            agentName = data.name;
            localStorage.setItem('auth_token', authToken);
            localStorage.setItem('agent_id', agentId);
            localStorage.setItem('agent_name', agentName);

            await loadDraws();
            await loadBlockedNumbers();
            await loadNumberLimits();

            loginScreen.style.display = 'none';
            mainApp.style.display = 'flex';
            await initAfterLogin();
        } catch (err) {
            loginMsg.innerText = 'Erreur: ' + err.message;
            console.error(err);
        }
    }

    document.getElementById('login-btn').addEventListener('click', () => {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        if (!username || !password) {
            document.getElementById('login-message').innerText = 'Ranpli tout chan yo';
            return;
        }
        login(username, password);
    });

    document.getElementById('login-username').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('login-password').focus();
    });
    document.getElementById('login-password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('login-btn').click();
    });

    const savedToken = localStorage.getItem('auth_token');
    const savedAgentId = localStorage.getItem('agent_id');
    const savedAgentName = localStorage.getItem('agent_name');
    if (savedToken && savedAgentId) {
        authToken = savedToken;
        agentId = savedAgentId;
        agentName = savedAgentName;
        loadDraws().then(() => {
            loginScreen.style.display = 'none';
            mainApp.style.display = 'flex';
            initAfterLogin();
        }).catch(() => {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('agent_id');
            localStorage.removeItem('agent_name');
        });
    } else {
        loginScreen.style.display = 'block';
        mainApp.style.display = 'none';
    }

    // Exposer les fonctions globales
    window.addBet = addBet;
    window.processFinalTicket = processFinalTicket;
    window.removeBet = removeBet;
    window.selectGame = selectGame;

    addBtn.addEventListener('click', addBet);
    printBtn.addEventListener('click', processFinalTicket);
    setupKeyboardNavigation();

    // Initialisation du jeu par défaut
    selectGame('borlette');
</script>
</body>
</html>
