<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOTATO PRO · Agent</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0b1e 0%, #1a1b3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 40px 30px;
            border: 1px solid rgba(173, 0, 241, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 56px;
            background: linear-gradient(135deg, #ad00f1, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ad00f1, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #a0a0b8;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #ad00f1;
            font-size: 18px;
        }

        .form-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 60px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #ad00f1;
            box-shadow: 0 0 0 3px rgba(173, 0, 241, 0.2);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-pwd {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #a0a0b8;
            cursor: pointer;
            font-size: 18px;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ad00f1, #00d4ff);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(173, 0, 241, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(255, 77, 77, 0.2);
            border-left: 4px solid #ff4d4d;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            color: #ff9e9e;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message.show {
            display: flex;
        }

        .info-note {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #6c6c8c;
        }

        .info-note a {
            color: #00d4ff;
            text-decoration: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-user-secret"></i>
            </div>
            <h1>LOTATO PRO</h1>
            <p>Espace Agent</p>
        </div>

        <div id="errorBox" class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText">Identifiants incorrects</span>
        </div>

        <form id="agentLoginForm">
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" class="form-input" placeholder="Identifiant agent" autocomplete="off" required>
                </div>
            </div>

            <div class="form-group">
                <div class="input-icon password-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-input" placeholder="Mot de passe" required>
                    <button type="button" class="toggle-pwd" id="togglePasswordBtn">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="btn-login">
                <span id="btnText">Se connecter</span>
                <span id="btnSpinner" style="display: none;" class="spinner"></span>
            </button>
        </form>

        <div class="info-note">
            🔐 Accès réservé aux agents agréés.<br>
            <a href="index.html">⇐ Accès propriétaire / superviseur</a>
        </div>
    </div>

    <script>
        // Configuration de l'API (identique à l'application existante)
        const API_BASE = window.location.origin + '/api';
        // Si vous utilisez un serveur distant, décommentez et adaptez :
        // const API_BASE = 'https://lotato1.onrender.com/api';
        
        const loginForm = document.getElementById('agentLoginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const togglePwdBtn = document.getElementById('togglePasswordBtn');

        // Afficher/masquer mot de passe
        togglePwdBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePwdBtn.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // Effacer les anciennes sessions agent pour éviter les conflits
        function clearAgentSession() {
            // On ne supprime que les clés liées à l'agent, pas celles du propriétaire/superviseur
            // pour ne pas interférer avec l'autre interface
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_role');
            localStorage.removeItem('user_name');
            localStorage.removeItem('agent_id');
            localStorage.removeItem('agent_name');
            localStorage.removeItem('owner_id');
            // On garde les éventuels autres champs mais on repart sain
        }

        // Vérifier si l'utilisateur a déjà une session valide (redirection si déjà connecté en tant qu'agent)
        async function checkExistingAgentSession() {
            const token = localStorage.getItem('auth_token');
            const role = localStorage.getItem('user_role');
            if (token && role === 'agent') {
                try {
                    const res = await fetch(`${API_BASE}/auth/verify`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        // déjà connecté => rediriger vers l'espace agent
                        window.location.href = 'agent1.html';
                    } else {
                        // token invalide, on nettoie
                        clearAgentSession();
                    }
                } catch (err) {
                    console.warn('Vérification session échouée, on ignore');
                    clearAgentSession();
                }
            } else {
                clearAgentSession();
            }
        }

        // Fonction de connexion à l'API avec rôle 'agent'
        async function authenticateAgent(username, password) {
            const response = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role: 'agent' })
            });

            if (!response.ok) {
                let errorMsg = 'Identifiants incorrects';
                try {
                    const data = await response.json();
                    errorMsg = data.error || errorMsg;
                } catch (e) {}
                throw new Error(errorMsg);
            }

            return await response.json();
        }

        // Gestion de la soumission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Cacher les erreurs précédentes
            errorBox.classList.remove('show');
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                errorText.innerText = 'Veuillez remplir tous les champs';
                errorBox.classList.add('show');
                return;
            }

            // Désactiver le bouton et afficher le loader
            loginBtn.disabled = true;
            btnText.style.display = 'none';
            btnSpinner.style.display = 'inline-block';

            try {
                const authResult = await authenticateAgent(username, password);
                
                if (authResult.success && authResult.token) {
                    // Stocker les informations de session agent
                    localStorage.setItem('auth_token', authResult.token);
                    localStorage.setItem('user_role', 'agent');
                    localStorage.setItem('user_name', authResult.name || username);
                    localStorage.setItem('agent_id', authResult.agentId || username);
                    localStorage.setItem('agent_name', authResult.name || username);
                    if (authResult.ownerId) {
                        localStorage.setItem('owner_id', authResult.ownerId);
                    }

                    // Redirection vers l'interface agent
                    window.location.href = 'agent1.html';
                } else {
                    throw new Error(authResult.error || 'Connexion refusée');
                }
            } catch (err) {
                errorText.innerText = err.message || 'Erreur de connexion. Vérifiez vos identifiants.';
                errorBox.classList.add('show');
                console.error('Login error:', err);
            } finally {
                // Réactiver le bouton
                loginBtn.disabled = false;
                btnText.style.display = 'inline';
                btnSpinner.style.display = 'none';
            }
        });

        // Vérifier session existante au chargement
        checkExistingAgentSession();
    </script>
</body>
</html>
